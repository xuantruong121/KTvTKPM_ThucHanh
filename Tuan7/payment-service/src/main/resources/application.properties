spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

clients.order-service.url=${ORDER_SERVICE_URL:http://localhost:8083}
internal.service-token=${SERVICE_TOKEN:svc-token-ktvtkpm-2026}
