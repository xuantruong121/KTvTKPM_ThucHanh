spring.application.name=payment-service

server.port=8084
server.address=0.0.0.0

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
